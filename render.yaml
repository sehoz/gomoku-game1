databases:
  - name: gomoku-db
    plan: free

services:
  - type: web
    name: gomoku-django-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: "pip install -r requirements.txt && python manage.py migrate --noinput && python manage.py collectstatic --noinput"
    startCommand: "daphne -b 0.0.0.0 -p $PORT gomoku_project.asgi:application"
    healthCheckPath: /api/health/
    envVars:
      - key: DJANGO_DEBUG
        value: "0"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: gomoku-db
          property: connectionString
